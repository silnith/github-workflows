name: Maven Verify

on:
  workflow_call:
    inputs:
      artifact-prefix:
        description: A prefix for artifact names.
        type: string
        required: true
      directory:
        description: The directory in which to run the build.
        type: string
        default: "."
      java-version:
        description: The version of Java to use.
        type: string
        default: 25

env: {}

#defaults:
#  run:
#    working-directory: ${{ inputs.directory }}

jobs:
  initialize-caches:
    name: Initialize Caches
    permissions:
      contents: read
    uses: ./.github/workflows/maven-cache-dependencies.yaml
    with:
      directory: ${{ inputs.directory }}
      java-version: ${{ inputs.java-version }}
    secrets: inherit
  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - initialize-caches
    permissions:
      contents: read
      packages: write
    env:
      GITHUB_TOKEN: ${{ github.token }}
    defaults:
      run:
        working-directory: ${{ inputs.directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - id: setup-java
        name: Set up Temurin JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin
          java-package: jdk
      # The setup-java action builds a settings file, but we want a better one
      # that includes GitHub repositories across all projects for the owner.
      - id: create-settings-file
        name: Create Maven Settings
        uses: s4u/maven-settings-action@v4.0.0
        with:
          githubServer: true
          servers: |
            [
              {
                "id": "github-${{ github.repository_owner }}",
                "username": "${{ github.actor }}",
                "password": "${{ github.token }}"
              }
            ]
          repositories: |
            [
              {
                "id": "github-${{ github.repository_owner }}",
                "name": "GitHub ${{ github.repository_owner }}",
                "url": "https://maven.pkg.github.com/${{ github.repository_owner }}/packages",
                "snapshots": {"enabled": true}
              }
            ]
          pluginRepositories: |
            [
              {
                "id": "github-${{ github.repository_owner }}",
                "name": "GitHub ${{ github.repository_owner }}",
                "url": "https://maven.pkg.github.com/${{ github.repository_owner }}/packages",
                "snapshots": {"enabled": true}
              }
            ]
      # The setup-java action populates the toolchains file, but it only uses
      # the new "marketing" version numbers.
      - id: create-toolchains-file
        name: Configure Maven Toolchains
        uses: cactuslab/maven-toolchains-xml-action@v2
        with:
          toolchains: |
            [
              {"jdkVersion": "${{ steps.setup-java.outputs.version }}", "jdkHome": "${{ steps.setup-java.outputs.path }}"},
              {"jdkVersion": "1.${{ steps.setup-java.outputs.version }}", "jdkHome": "${{ steps.setup-java.outputs.path }}"}
            ]
      - name: Fetch Cached Maven Dependencies
        uses: actions/cache/restore@v5
        with:
          key: maven-${{ needs.initialize-caches.outputs.date }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ needs.initialize-caches.outputs.year }}-${{ needs.initialize-caches.outputs.month }}-${{ needs.initialize-caches.outputs.day }}
            maven-${{ needs.initialize-caches.outputs.year }}-${{ needs.initialize-caches.outputs.month }}
            maven-${{ needs.initialize-caches.outputs.year }}
            maven
          path: |
            ~/.m2/repository
      - name: Fetch Cached NVD Data
        uses: actions/cache/restore@v5
        with:
          key: owasp-${{ needs.initialize-caches.outputs.date }}
          restore-keys: |
            owasp-${{ needs.initialize-caches.outputs.year }}-${{ needs.initialize-caches.outputs.month }}
            owasp-${{ needs.initialize-caches.outputs.year }}
            owasp
          path: |
            ~/.m2/repository/org/owasp/dependency-check-data/
      - name: Clean
        run: mvn clean
      - name: Verify
        run: mvn verify
      - name: Site
        continue-on-error: true
        run: mvn site
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-prefix }}-target
          path: ${{ inputs.directory }}/**/target/
      - name: Publish Package
        run: mvn deploy
  publish-test-results:
    name: Publish Test Results
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      checks: write
    #defaults:
    #  run:
    #    working-directory: ${{ inputs.directory }}
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact-prefix }}-target
          path: ${{ inputs.directory }}/
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action/linux@v2
        if: (!cancelled())
        continue-on-error: true
        with:
          check_name: "Java Test Results"
          files: |
            ${{ inputs.directory }}/**/target/surefire-reports/TEST-*.xml
            ${{ inputs.directory }}/**/target/failsafe-reports/TEST-*.xml
          comment_mode: off
